<!DOCTYPE html>
<html lang="en">
  <head>
    <title>v_player</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="./static/favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css">
    <link rel="stylesheet" href="player.css">
  </head>
  <body>
    <div id="player" class="player">
      <div class="js-video-container screen"></div>
      <div class="bottom-controls">
        <div class="left-buttons">
          <button class="js-play-button player-button" aria-label="Play">
            <i class="fa fa-play" aria-hidden="true"></i>
          </button>
          <button class="js-pause-button player-button" hidden aria-label="Pause">
            <i class="fa fa-pause" aria-hidden="true"></i>
          </button>
          <button class="js-mute-button player-button player-button-volume" aria-label="Mute On">
            <i class="fa fa-volume-up" aria-hidden="true"></i>
          </button>
          <button class="js-volume-button player-button player-button-volume" hidden aria-label="Mute Off">
            <i class="fa fa-volume-off" aria-hidden="true"></i>
          </button>
        </div>
        <div class="viewing-panel">
          <div class="js-current-time viewing-time"></div>
          <div class="js-progress viewing-progressbar">
            <div class="js-progress-slider video-duration"></div>
            <div class="progress-handle"></div>
          </div>
          <div class="js-duration viewing-time"></div>
        </div>
        <div class="right-buttons">
          <button class="js-fullscreen-button player-button" aria-label="Fullscreen">
            <i class="fa fa-expand" aria-hidden="true"></i>
          </button>
        </div>
      </div>
    </div>


    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://unpkg.com/playable@2.10.3/dist/statics/playable.bundle.min.js"></script>
    <script src="player.js"></script>
    <script type="text/javascript">createPlayer({elementId: 'player'});</script>
  </body>
</html>
