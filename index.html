<!DOCTYPE html>
<html>
  <head>
    <title>Пример подключения плеера</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="font-awesome-4.7.0/css/font-awesome.min.css">
    <style>
    .player {
      width: 800px;
      height: 600px;
      display:flex;
      flex-direction:column;
    }
    .player--shadow {
      box-shadow: 0 0 8px 5px rgba(0, 0, 0, 0.5);
    }
    .video-container {
      flex-grow :1;
    }
    .controls {
      background-color: black;
      flex: 0 0 auto;
      display:flex;
      align-items:center;
    }
    .controls-expand{
      flex-grow: 1;
    }
    .control-btn {
      width: 44px;
      height: 44px;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      color: white;
      background-color: transparent;
      font-size: 18px;
      margin-bottom: 2px;
      margin-right: 4px;
    }
    </style>
  </head>
  <body>
    <div id="player" class="player player--shadow">
      <div class="js-video-container video-container"></div>
      <div class="controls">
        <button class="js-play-button control-btn" aria-label="Play">
          <i class="fa fa-play" aria-hidden="true"></i>
        </button>
        <button class="js-pause-button control-btn" hidden aria-label="Pause">
          <i class="fa fa-pause" aria-hidden="true"></i>
        </button>
        <button class="js-mute-button control-btn" aria-label="Mute On">
          <i class="fa fa-volume-up" aria-hidden="true"></i>
        </button>
        <button class="js-volume-button control-btn" aria-label="Mute Off" hidden>
          <i class="fa fa-volume-off" aria-hidden="true"></i>
        </button>
        <div class="controls-expand"></div>
        <button class="js-fullscreen-button control-btn" aria-label="Fullscreen">
          <i class="fa fa-expand" aria-hidden="true"></i>
        </button>
      </div>
      <!-- Here can be placed player controls: play and volume buttons -->
    </div>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://unpkg.com/playable@2.10.3/dist/statics/playable.bundle.min.js"></script>
    <script src="player.js"></script>
    <script type="text/javascript">createPlayer({elementId: 'player'});</script>
  </body>
</html>
